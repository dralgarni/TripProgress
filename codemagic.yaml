workflows:
  appetize-ios-simulator:
    name: Build Appetize iOS Simulator Zip
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build iOS Simulator app
        script: |
          xcodebuild -project TripProgress.xcodeproj -target TripProgress -sdk iphonesimulator -configuration Debug -derivedDataPath build/AppetizeDerivedData CODE_SIGNING_ALLOWED=NO build
      - name: Package for Appetize
        script: |
          mkdir -p Appetize
          cd build/AppetizeDerivedData/Build/Products/Debug-iphonesimulator
          zip -qry "$CM_BUILD_DIR/Appetize/TripProgress-Appetize.zip" TripProgress.app
    artifacts:
      - Appetize/TripProgress-Appetize.zip
