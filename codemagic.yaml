workflows:
  appetize-ios-simulator:
    name: Build Appetize iOS Simulator Zip
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build iOS Simulator app
        script: |
          xcodebuild \
            -project TripProgress.xcodeproj \
            -target TripProgress \
            -sdk iphonesimulator \
            -configuration Debug \
            SYMROOT="$CM_BUILD_DIR/build" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package for Appetize
        script: |
          mkdir -p Appetize
          cd "$CM_BUILD_DIR/build/Debug-iphonesimulator"
          zip -qry "$CM_BUILD_DIR/Appetize/TripProgress-Appetize.zip" TripProgress.app

    artifacts:
      - Appetize/TripProgress-Appetize.zip
