name: Build Appetize iOS Simulator Zip

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Simulator App
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build simulator app
        run: |
          xcodebuild \
            -project TripProgress.xcodeproj \
            -target TripProgress \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build/AppetizeDerivedData \
            -destination 'generic/platform=iOS Simulator' \
            clean build

      - name: Package for Appetize
        run: |
          mkdir -p Appetize
          cd build/AppetizeDerivedData/Build/Products/Debug-iphonesimulator
          zip -qry "$GITHUB_WORKSPACE/Appetize/TripProgress-Appetize.zip" TripProgress.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripProgress-Appetize
          path: Appetize/TripProgress-Appetize.zip
          if-no-files-found: error
